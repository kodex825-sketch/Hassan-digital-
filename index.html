<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#0d1b3e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Hassan Digital" />
  <title>Hassan Digital — Devis Pro</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #080f22;
      --navy: #0d1b3e;
      --navy2: #112050;
      --surface: #0f1d45;
      --card: #111f48;
      --border: #1e2e5a;
      --accent: #d4a843;
      --accent2: #e8c97a;
      --text: #f0ede8;
      --muted: #7a8ab0;
      --danger: #e05555;
      --success: #4caf50;
      --radius: 14px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100dvh; overflow-x: hidden; }

    header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(8,15,34,0.95); backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 10px 18px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo-wrap { display: flex; align-items: center; gap: 10px; }
    .logo-img { width: 38px; height: 38px; border-radius: 8px; object-fit: cover; }
    .logo-text { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 17px; letter-spacing: -0.3px; line-height: 1.1; }
    .logo-text span { color: var(--accent); display: block; font-size: 10px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
    .header-badge { font-size: 10px; font-weight: 700; background: var(--accent); color: #000; padding: 4px 10px; border-radius: 20px; letter-spacing: 0.5px; text-transform: uppercase; }

    .tabs { display: flex; background: var(--navy); border-bottom: 1px solid var(--border); }
    .tab { flex: 1; padding: 12px 6px; font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.3px; text-align: center; color: var(--muted); cursor: pointer; border: none; background: none; transition: color 0.2s; white-space: nowrap; position: relative; }
    .tab.active { color: var(--accent); }
    .tab.active::after { content: ''; position: absolute; bottom: 0; left: 15%; right: 15%; height: 2px; background: var(--accent); border-radius: 2px 2px 0 0; }

    .page { display: none; padding: 18px; }
    .page.active { display: block; }

    .chip { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; background: rgba(212,168,67,0.12); color: var(--accent); margin-bottom: 12px; letter-spacing: 0.3px; }

    .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 14px; }
    .field { margin-bottom: 13px; }
    .field:last-child { margin-bottom: 0; }
    label { display: block; font-size: 10px; font-weight: 600; color: var(--muted); margin-bottom: 6px; letter-spacing: 1px; text-transform: uppercase; }
    input, textarea, select { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; outline: none; transition: border-color 0.2s; -webkit-appearance: none; }
    input:focus, textarea:focus, select:focus { border-color: var(--accent); }
    textarea { resize: vertical; min-height: 75px; }
    .validity-row { display: flex; gap: 10px; }
    .validity-row .field { flex: 1; }

    .service-item { display: flex; align-items: flex-start; gap: 12px; padding: 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 10px; transition: border-color 0.2s, background 0.2s; cursor: pointer; }
    .service-item.selected { border-color: var(--accent); background: rgba(212,168,67,0.06); }
    .service-check { width: 22px; height: 22px; border-radius: 6px; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; margin-top: 1px; }
    .service-item.selected .service-check { background: var(--accent); border-color: var(--accent); }
    .service-check svg { opacity: 0; transition: opacity 0.2s; }
    .service-item.selected .service-check svg { opacity: 1; }
    .service-info { flex: 1; }
    .service-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px; }
    .service-desc { font-size: 12px; color: var(--muted); margin-top: 2px; line-height: 1.4; }
    .service-price-col { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 13px; color: var(--accent); white-space: nowrap; text-align: right; margin-top: 2px; }
    .price-unit { font-size: 9px; color: var(--muted); font-weight: 400; display: block; }
    .price-edit { display: flex; align-items: center; gap: 6px; margin-top: 8px; }
    .price-edit input { width: 120px; font-size: 14px; padding: 7px 10px; }
    .price-edit span { font-size: 11px; color: var(--muted); }

    .total-bar { background: linear-gradient(135deg, #0d1b3e, #14245a); border: 1px solid rgba(212,168,67,0.35); border-radius: var(--radius); padding: 18px; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
    .total-label { font-size: 12px; color: var(--muted); margin-bottom: 2px; }
    .total-currency { font-size: 10px; color: var(--muted); }
    .total-amount { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; color: var(--accent); }

    .btn { width: 100%; padding: 15px; border-radius: var(--radius); border: none; font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 0.5px; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-primary { background: var(--accent); color: #000; }
    .btn-primary:active { opacity: 0.82; transform: scale(0.98); }
    .btn-outline { background: transparent; color: var(--text); border: 1px solid var(--border); margin-top: 10px; }
    .btn-outline:active { background: var(--surface); }

    #preview-content { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 16px; }
    .preview-header { background: linear-gradient(135deg, #0a1530, #0f1f50); border-bottom: 1px solid rgba(212,168,67,0.25); padding: 20px; display: flex; align-items: center; gap: 14px; }
    .preview-header-logo { width: 48px; height: 48px; border-radius: 10px; object-fit: cover; }
    .preview-logo-text { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 20px; letter-spacing: -0.3px; }
    .preview-logo-text span { color: var(--accent); }
    .preview-tagline { font-size: 11px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-top: 2px; }
    .preview-body { padding: 18px; }
    .preview-meta { display: flex; justify-content: space-between; margin-bottom: 14px; flex-wrap: wrap; gap: 10px; }
    .meta-label { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 2px; }
    .meta-value { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 13px; }
    .devis-num { color: var(--accent); }
    .preview-client { background: var(--surface); border-radius: 10px; padding: 13px; margin-bottom: 14px; }
    .client-name { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; margin-bottom: 3px; }
    .client-contact { font-size: 12px; color: var(--muted); line-height: 1.5; }
    .services-table { width: 100%; border-collapse: collapse; }
    .services-table th { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); font-weight: 600; padding: 7px 0; border-bottom: 1px solid var(--border); text-align: left; }
    .services-table th:last-child { text-align: right; }
    .services-table td { padding: 11px 0; border-bottom: 1px solid rgba(30,46,90,0.6); font-size: 13px; vertical-align: top; }
    .services-table td:last-child { text-align: right; font-family: 'Syne', sans-serif; font-weight: 700; color: var(--accent); white-space: nowrap; }
    .td-name { font-weight: 600; }
    .td-desc { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .preview-total { margin-top: 14px; display: flex; justify-content: space-between; align-items: center; padding: 14px; background: rgba(212,168,67,0.07); border-radius: 10px; border: 1px solid rgba(212,168,67,0.25); }
    .preview-total-label { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px; }
    .preview-total-amount { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 20px; color: var(--accent); }
    .preview-note { margin-top: 12px; font-size: 12px; color: var(--muted); font-style: italic; line-height: 1.6; padding: 10px; background: rgba(255,255,255,0.02); border-radius: 8px; border-left: 2px solid var(--accent); }
    .preview-footer { border-top: 1px solid var(--border); padding: 14px 18px; font-size: 11px; color: var(--muted); text-align: center; line-height: 1.7; }

    .history-item { display: flex; align-items: center; gap: 12px; padding: 14px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 10px; }
    .history-icon { width: 40px; height: 40px; border-radius: 10px; background: rgba(212,168,67,0.1); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .history-info { flex: 1; min-width: 0; }
    .history-client { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .history-date { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .history-amount { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 14px; color: var(--accent); text-align: right; white-space: nowrap; }
    .history-unit { font-size: 10px; color: var(--muted); font-weight: 400; }

    .empty-state { text-align: center; padding: 50px 20px; color: var(--muted); }
    .empty-state p { font-size: 14px; margin-top: 10px; }
    .divider { height: 1px; background: var(--border); margin: 14px 0; }

    .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--success); color: #fff; padding: 12px 22px; border-radius: 30px; font-size: 13px; font-weight: 600; z-index: 999; opacity: 0; transition: all 0.3s; pointer-events: none; white-space: nowrap; box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>

];

let counter = parseInt(localStorage.getItem('hd-ctr') || '1');
let history = JSON.parse(localStorage.getItem('hd-hist') || '[]');
let currentDevis = null;

document.addEventListener('DOMContentLoaded', () => {
  const today = new Date();
  const val = new Date(); val.setDate(today.getDate() + 15);
  document.getElementById('devis-date').value = today.toISOString().split('T')[0];
  document.getElementById('devis-validity').value = val.toISOString().split('T')[0];
  renderServices();
  renderHistory();
  // Inject real logo
  document.querySelectorAll('.logo-img, .preview-header-logo').forEach(img => {
    img.src = 'data:image/jpeg;base64,' + LOGO_DATA;
  });
});

function switchTab(tab) {
  ['nouveau','services','apercu','historique'].forEach((t, i) => {
    document.querySelectorAll('.tab')[i].classList.toggle('active', t === tab);
    document.getElementById('tab-' + t).classList.toggle('active', t === tab);
  });
  if (tab === 'services') renderServices();
  if (tab === 'historique') renderHistory();
}

function renderServices() {
  document.getElementById('services-list').innerHTML = services.map(s => `
    <div class="service-item ${s.selected?'selected':''}" onclick="toggleService(${s.id})">
      <div class="service-check">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="3.5"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <div class="service-info">
        <div class="service-name">${s.name}</div>
        <div class="service-desc">${s.desc}</div>
        ${s.selected ? `<div class="price-edit">
          <input type="number" value="${s.price}" onclick="event.stopPropagation()" oninput="updatePrice(${s.id},this.value)" />
          <span>FCFA</span>
        </div>` : ''}
      </div>
      <div class="service-price-col">${formatPrice(s.price)}<span class="price-unit">FCFA</span></div>
    </div>
  `).join('');
  updateTotal();
}

function toggleService(id) {
  services.find(x=>x.id===id).selected ^= true;
  renderServices();
}

function updatePrice(id, val) {
  services.find(x=>x.id===id).price = parseInt(val)||0;
  updateTotal();
}

function updateTotal() {
  const t = services.filter(s=>s.selected).reduce((a,s)=>a+s.price,0);
  document.getElementById('total-display').textContent = formatPrice(t) + ' FCFA';
}

function formatPrice(n) { return new Intl.NumberFormat('fr-FR').format(n); }
function formatDate(str) {
  if (!str) return '';
  const [y,m,d] = str.split('-');
  return `${d}/${m}/${y}`;
}

function generateDevis() {
  const sel = services.filter(s=>s.selected);
  if (!sel.length) { showToast('Sélectionne au moins un service !','#e05555'); return; }
  const name = document.getElementById('client-name').value.trim();
  if (!name) { showToast('Entre le nom du client !','#e05555'); switchTab('nouveau'); return; }
  const num = 'HD-' + String(counter).padStart(4,'0');
  const date = document.getElementById('devis-date').value;
  const validity = document.getElementById('devis-validity').value;
  const email = document.getElementById('client-email').value;
  const phone = document.getElementById('client-phone').value;
  const company = document.getElementById('client-company').value;
  const note = document.getElementById('devis-note').value;
  const total = sel.reduce((a,s)=>a+s.price,0);
  currentDevis = {num, name, email, phone, company, note, date, validity, services:sel, total};
  history.unshift({num, name, date, total});
  if (history.length > 30) history.pop();
  localStorage.setItem('hd-hist', JSON.stringify(history));
  counter++;
  localStorage.setItem('hd-ctr', counter);
  renderPreview(currentDevis);
  switchTab('apercu');
  showToast('Devis généré avec succès ✓');
}

function renderPreview(d) {
  const logoSrc = 'data:image/jpeg;base64,' + LOGO_DATA;
  const rows = d.services.map(s=>`
    <tr>
      <td><div class="td-name">${s.name}</div><div class="td-desc">${s.desc}</div></td>
      <td>${formatPrice(s.price)} FCFA</td>
    </tr>
  `).join('');
  document.getElementById('preview-content').innerHTML = `
    <div class="preview-header">
      <img class="preview-header-logo" src="${logoSrc}" alt="Hassan Digital"/>
      <div>
        <div class="preview-logo-text">Hassan<span>.</span>Digital</div>
        <div class="preview-tagline">Agence Digitale · Abidjan, CI</div>
      </div>
    </div>
    <div class="preview-body">
      <div class="preview-meta">
        <div><div class="meta-label">Numéro</div><div class="meta-value devis-num">${d.num}</div></div>
        <div><div class="meta-label">Date</div><div class="meta-value">${formatDate(d.date)}</div></div>
        <div><div class="meta-label">Valide jusqu'au</div><div class="meta-value">${formatDate(d.validity)}</div></div>
      </div>
      <div class="preview-client">
        <div class="client-name">${d.name}</div>
        <div class="client-contact">${[d.company,d.email,d.phone].filter(Boolean).join(' · ') || 'Client Hassan Digital'}</div>
      </div>
      <table class="services-table">
        <thead><tr><th>Service</th><th>Montant</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
      <div class="preview-total">
        <div class="preview-total-label">TOTAL</div>

      </div>
      ${d.note ? `<div class="preview-note">💬 ${d.note}</div>` : ''}
    </div>
    <div class="preview-footer">
      bambahassan869@gmail.com · 0594662839<br/>
      rachid601-max.github.io/Hassan-portfolio/<br/>
      <span style="color:var(--accent);font-weight:700">Hassan Digital — Abidjan, Côte d'Ivoire 🇨🇮</span>
    </div>
  `;
  document.getElementById('preview-actions').style.display = 'block';
}

function copyDevis() {
  if (!currentDevis) return;
  const d = currentDevis;
  const lines = d.services.map(s=>`• ${s.name} : ${formatPrice(s.price)} FCFA`).join('\n');
  const text = `DEVIS ${d.num} — Hassan Digital\n${'─'.repeat(34)}\nClient : ${d.name}${d.company?'\nStructure : '+d.company:''}${d.email?'\nEmail : '+d.email:''}${d.phone?'\nTél : '+d.phone:''}\nDate : ${formatDate(d.date)} | Valide jusqu'au : ${formatDate(d.validity)}\n\nSERVICES :\n${lines}\n\n${'─'.repeat(34)}\nTOTAL : ${formatPrice(d.total)} FCFA\n${'─'.repeat(34)}\nbambahassan869@gmail.com | 0594662839\nHassan Digital — Abidjan, Côte d'Ivoire`;
  navigator.clipboard.writeText(text).then(()=>showToast('Devis copié ! 📋'));
}

  if (!currentDevis) return;

  const text = `*DEVIS ${d.num} — Hassan Digital* 🇨🇮\n\n👤 Client : ${d.name}\n📅 Date : ${formatDate(d.date)} | Valide jusqu'au : ${formatDate(d.validity)}\n\n*📋 Services :*\n${lines}\n\n*💰 TOTAL : ${formatPrice(d.total)} FCFA*\n\n📧 bambahassan869@gmail.com\n📞 0594662839\n🌐 rachid601-max.github.io/Hassan-portfolio/\n\n_Hassan Digital — Abidjan, Côte d'Ivoire_`;

    </div>`;
    return;

  list.innerHTML = history.map(h=>`
    <div class="history-item">
      <div class="history-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      </div>
      <div class="history-info">
        <div class="history-client">${h.name}</div>
        <div class="history-date">${h.num} · ${formatDate(h.date)}</div>
      </div>
      <div class="history-amount">${formatPrice(h.total)}<br/><span class="history-unit">FCFA</span></div>
    </div>
  `).join('');
}

function showToast(msg, color='var(--success)') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.background = color;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

if ('serviceWorker' in navigator) {
  window.addEventListener('load', ()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
</script>
</body>
</html>
